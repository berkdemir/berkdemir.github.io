baseURL = 'https://berkdemir.github.io/'
title = 'Berk Demir'
theme = 'paper'

[languages.en]
  languageCode = 'en-us'
  weight = 1

[params]
  mainSections = ['posts']
  color = 'light'        # linen, wheat, gray, light — 'light' is the cleanest white
  rss = true
  disableHLJS = false
  disablePostNavigation = false
  monoDarkIcon = true
  math = true

  # Profile shown on the homepage
  name = 'Berk Demir'
  bio = 'Notes on tunnels, code, and life in Copenhagen.'
  # avatar = 'your-gravatar-email@example.com'  # optional

  # Social icons in the header — uncomment what you want
  # github = 'berkdemir'
  # linkedin = 'berk-demir'
  # mastodon = 'https://mastodon.social/@you'

[markup.goldmark.renderer]
  unsafe = true           # lets you use raw HTML in markdown (e.g. <sub>, <sup>)

[taxonomies]
  category = 'categories'
  tag = 'tags'

[[menu.main]]
  identifier = 'cv'
  name = 'CV'
  url = '/cv/'
  weight = 10

[[menu.main]]
  identifier = 'finite-element'
  name = 'Finite Element'
  url = '/tags/finite-element/'
  weight = 20

[[menu.main]]
  identifier = 'tunnels'
  name = 'Tunnels & Structures'
  url = '/tags/tunnels-structures/'
  weight = 30

[[menu.main]]
  identifier = 'geotechnics'
  name = 'Geotechnics'
  url = '/tags/geotechnics/'
  weight = 40

[[menu.main]]
  identifier = 'showcases'
  name = 'Showcases'
  url = '/tags/showcases/'
  weight = 50

[module]
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "content/posts/_assets"
    target = "static/posts/_assets"
  [[module.mounts]]
    source = "content/cv/_assets"
    target = "static/cv/_assets"