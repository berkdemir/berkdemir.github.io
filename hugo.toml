baseURL = 'https://berkdemir.github.io/'
title = 'Berk Demir'
theme = 'PaperMod'
paginate = 10
enableRobotsTXT = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = 'production'
  description = 'Notes on tunnels, code, and life in Copenhagen.'
  author = 'Berk Demir'

  defaultTheme = 'light'
  disableThemeToggle = true

  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  math = true

  [params.profileMode]
    enabled = true
    title = 'Berk Demir'
    subtitle = 'Underground engineer. Notes on tunnels, code, and life in Copenhagen.'
    imageUrl = '/profile.jpg'
    imageWidth = 120
    imageHeight = 120
    imageTitle = 'Berk Demir'

[[params.socialIcons]]
  name = 'linkedin'
  url = 'https://www.linkedin.com/in/bdberkdemir/'

[markup.goldmark.renderer]
  unsafe = true

[markup.tableOfContents]
  startLevel = 2
  endLevel = 4

[taxonomies]
  tag = 'tags'
  category = 'categories'

[[menu.main]]
  identifier = 'finite-element'
  name = 'Finite Element'
  url = '/tags/finite-element/'
  weight = 10

[[menu.main]]
  identifier = 'tunnels'
  name = 'Tunnels & Structures'
  url = '/tags/tunnels-structures/'
  weight = 20

[[menu.main]]
  identifier = 'geotechnics'
  name = 'Geotechnics'
  url = '/tags/geotechnics/'
  weight = 30

[[menu.main]]
  identifier = 'showcases'
  name = 'Showcases'
  url = '/tags/showcases/'
  weight = 40

[[menu.main]]
