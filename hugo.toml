  name = 'Search'
  url = '/search/'
  weight = 50

[[menu.main]]
  identifier = 'archive'
  name = 'Archive'
  url = '/archives/'
  weight = 60

[[menu.main]]
  identifier = 'cv'
  name = 'CV'
  url = '/cv/'
  weight = 70
